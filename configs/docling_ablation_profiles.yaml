profile_defaults:
  native_text_accurate_no_ocr: &native_text_accurate_no_ocr
    pipeline: standard
    device: auto
    do_ocr: false
    force_full_page_ocr: false
    do_table_structure: true
    table_mode: accurate
    generate_page_images: true
    generate_picture_images: true
    images_scale: 2.0
    gpu_required: false
    gpu_preferred: false
    group: native_text
    quality_tier: strong
    resource_class: high

  tesseract_not_forced: &tesseract_not_forced
    pipeline: standard
    device: auto
    ocr_engine: tesseract
    ocr_lang: [spa, eng]
    do_ocr: true
    force_full_page_ocr: false
    do_table_structure: true
    table_mode: accurate
    do_cell_matching: true
    generate_page_images: true
    generate_picture_images: true
    images_scale: 2.0
    gpu_required: false
    gpu_preferred: false
    group: ocr
    quality_tier: strong
    resource_class: high

  tesseract_forced: &tesseract_forced
    pipeline: standard
    device: auto
    ocr_engine: tesseract
    ocr_lang: [spa, eng]
    do_ocr: true
    force_full_page_ocr: true
    do_table_structure: true
    table_mode: accurate
    do_cell_matching: true
    generate_page_images: true
    generate_picture_images: true
    images_scale: 2.0
    gpu_required: false
    gpu_preferred: false
    group: ocr
    quality_tier: heavy
    resource_class: high

  easyocr_common: &easyocr_common
    pipeline: standard
    device: auto
    ocr_engine: easyocr
    ocr_lang: [es, en]
    do_ocr: true
    do_table_structure: true
    table_mode: accurate
    do_cell_matching: true
    generate_page_images: true
    generate_picture_images: true
    images_scale: 2.0
    gpu_required: false
    gpu_preferred: true
    group: ocr
    quality_tier: heavy
    resource_class: high

  rapidocr_common: &rapidocr_common
    pipeline: standard
    device: auto
    ocr_engine: rapidocr
    do_ocr: true
    do_table_structure: true
    table_mode: accurate
    do_cell_matching: true
    generate_page_images: true
    generate_picture_images: true
    images_scale: 2.0
    gpu_required: false
    gpu_preferred: false
    group: ocr
    quality_tier: heavy
    resource_class: high

  cuda_standard_common: &cuda_standard_common
    pipeline: standard
    device: cuda
    gpu_required: true
    gpu_preferred: true
    do_table_structure: true
    table_mode: accurate
    generate_page_images: true
    generate_picture_images: true
    images_scale: 2.0
    quality_tier: heavy
    resource_class: high
    group: gpu_performance
    page_batch_size: 4
    layout_batch_size: 4
    table_batch_size: 4
    num_threads: 8

  vlm_common: &vlm_common
    pipeline: vlm
    device: cuda
    gpu_required: true
    gpu_preferred: true
    generate_page_images: true
    generate_picture_images: true
    images_scale: 2.0
    quality_tier: extreme
    resource_class: extreme
    group: vlm
    page_batch_size: 2
    layout_batch_size: 2
    num_threads: 8

  extreme_common: &extreme_common
    pipeline: standard
    device: cuda
    gpu_required: true
    gpu_preferred: true
    do_ocr: true
    force_full_page_ocr: true
    do_table_structure: true
    table_mode: accurate
    generate_page_images: true
    generate_picture_images: true
    images_scale: 3.0
    quality_tier: extreme
    resource_class: extreme
    group: heavy_quality
    page_batch_size: 4
    layout_batch_size: 4
    table_batch_size: 4
    num_threads: 8

profiles:
  standard_fast_no_ocr:
    description: "Fast baseline using native PDF text, no OCR, fast table mode."
    group: native_text
    quality_tier: baseline
    gpu_required: false
    gpu_preferred: false
    resource_class: low
    pipeline: standard
    device: auto
    do_ocr: false
    force_full_page_ocr: false
    do_table_structure: true
    table_mode: fast
    do_cell_matching: true
    generate_page_images: false
    generate_picture_images: false
    images_scale: 1.0

  standard_accurate_no_ocr:
    <<: *native_text_accurate_no_ocr
    description: "Backward-compatible accurate native-text profile with cell matching enabled."
    do_cell_matching: true

  standard_accurate_cellmatch_false:
    <<: *native_text_accurate_no_ocr
    description: "Backward-compatible accurate native-text profile with cell matching disabled."
    group: cell_matching
    do_cell_matching: false

  standard_tesseract_ocr_psm3:
    <<: *tesseract_not_forced
    description: "Backward-compatible Tesseract OCR profile, not forced, PSM 3."
    psm: 3

  standard_tesseract_force_ocr_psm6:
    <<: *tesseract_forced
    description: "Force full-page Tesseract OCR, PSM 6, for bad embedded text layers."
    psm: 6

  standard_easyocr_force_ocr:
    <<: *easyocr_common
    description: "Force OCR with EasyOCR for image-heavy PDFs."
    force_full_page_ocr: true

  standard_cuda_accurate:
    <<: *cuda_standard_common
    description: "Backward-compatible standard pipeline using CUDA acceleration where available."
    do_ocr: true
    force_full_page_ocr: false
    do_cell_matching: true

  vlm_granite_docling_cuda:
    <<: *vlm_common
    description: "VLM pipeline with Granite Docling on CUDA."
    vlm_model: granite_docling
    do_ocr: false
    force_full_page_ocr: false
    do_table_structure: true
    table_mode: accurate
    do_cell_matching: true

  standard_accurate_no_ocr_doclingparse_cellmatch_true:
    <<: *native_text_accurate_no_ocr
    description: "Native-text accurate TableFormer using docling_parse backend with cell matching enabled."
    group_aliases: [backend]
    pdf_backend: docling_parse
    do_cell_matching: true

  standard_accurate_no_ocr_doclingparse_cellmatch_false:
    <<: *native_text_accurate_no_ocr
    description: "Native-text accurate TableFormer using docling_parse backend with cell matching disabled."
    group_aliases: [backend]
    pdf_backend: docling_parse
    do_cell_matching: false

  standard_accurate_no_ocr_pypdfium2_cellmatch_true:
    <<: *native_text_accurate_no_ocr
    description: "Native-text accurate TableFormer using pypdfium2 backend with cell matching enabled."
    group_aliases: [backend]
    pdf_backend: pypdfium2
    do_cell_matching: true

  standard_accurate_no_ocr_pypdfium2_cellmatch_false:
    <<: *native_text_accurate_no_ocr
    description: "Native-text accurate TableFormer using pypdfium2 backend with cell matching disabled."
    group_aliases: [backend]
    pdf_backend: pypdfium2
    do_cell_matching: false

  standard_accurate_no_ocr_threaded_doclingparse_cellmatch_true:
    <<: *native_text_accurate_no_ocr
    description: "Native-text accurate TableFormer using threaded docling_parse backend with cell matching enabled."
    group_aliases: [backend]
    pdf_backend: threaded_docling_parse
    do_cell_matching: true

  standard_accurate_no_ocr_threaded_doclingparse_cellmatch_false:
    <<: *native_text_accurate_no_ocr
    description: "Native-text accurate TableFormer using threaded docling_parse backend with cell matching disabled."
    group_aliases: [backend]
    pdf_backend: threaded_docling_parse
    do_cell_matching: false

  standard_accurate_no_ocr_doclingparse_scale3:
    <<: *native_text_accurate_no_ocr
    description: "Native-text docling_parse profile with page and picture images at scale 3.0."
    group_aliases: [backend]
    pdf_backend: docling_parse
    do_cell_matching: true
    images_scale: 3.0
    quality_tier: heavy
    resource_class: extreme

  standard_accurate_no_ocr_pypdfium2_scale3:
    <<: *native_text_accurate_no_ocr
    description: "Native-text pypdfium2 profile with page and picture images at scale 3.0."
    group_aliases: [backend]
    pdf_backend: pypdfium2
    do_cell_matching: true
    images_scale: 3.0
    quality_tier: heavy
    resource_class: extreme

  standard_tesseract_ocr_psm3_not_forced:
    <<: *tesseract_not_forced
    description: "Tesseract OCR supplementing native text, PSM 3."
    psm: 3

  standard_tesseract_ocr_psm4_not_forced:
    <<: *tesseract_not_forced
    description: "Tesseract OCR supplementing native text, PSM 4."
    psm: 4

  standard_tesseract_ocr_psm6_not_forced:
    <<: *tesseract_not_forced
    description: "Tesseract OCR supplementing native text, PSM 6."
    psm: 6

  standard_tesseract_ocr_psm11_not_forced:
    <<: *tesseract_not_forced
    description: "Tesseract OCR supplementing native text, PSM 11."
    psm: 11

  standard_tesseract_ocr_psm12_not_forced:
    <<: *tesseract_not_forced
    description: "Tesseract OCR supplementing native text, PSM 12."
    psm: 12

  standard_tesseract_force_ocr_psm3:
    <<: *tesseract_forced
    description: "Forced full-page Tesseract OCR, PSM 3."
    psm: 3

  standard_tesseract_force_ocr_psm4:
    <<: *tesseract_forced
    description: "Forced full-page Tesseract OCR, PSM 4."
    psm: 4

  standard_tesseract_force_ocr_psm11:
    <<: *tesseract_forced
    description: "Forced full-page Tesseract OCR, PSM 11."
    psm: 11

  standard_tesseract_force_ocr_psm12:
    <<: *tesseract_forced
    description: "Forced full-page Tesseract OCR, PSM 12."
    psm: 12

  standard_tesseract_force_ocr_psm6_cellmatch_false:
    <<: *tesseract_forced
    description: "Forced full-page Tesseract OCR, PSM 6, with cell matching disabled."
    group: cell_matching
    psm: 6
    do_cell_matching: false

  standard_tesseract_force_ocr_psm11_cellmatch_false:
    <<: *tesseract_forced
    description: "Forced full-page Tesseract OCR, PSM 11, with cell matching disabled."
    group: cell_matching
    psm: 11
    do_cell_matching: false

  standard_easyocr_force_ocr_cellmatch_false:
    <<: *easyocr_common
    description: "Forced EasyOCR with cell matching disabled for merged-column issues."
    group: cell_matching
    force_full_page_ocr: true
    do_cell_matching: false

  standard_easyocr_ocr_not_forced:
    <<: *easyocr_common
    description: "EasyOCR enabled but not forced for mixed native-text/image PDFs."
    force_full_page_ocr: false

  standard_easyocr_force_ocr_scale3:
    <<: *easyocr_common
    description: "Forced EasyOCR with image scale 3.0."
    force_full_page_ocr: true
    images_scale: 3.0
    resource_class: extreme

  standard_rapidocr_ocr_not_forced:
    <<: *rapidocr_common
    description: "RapidOCR enabled but not forced, if supported by installed Docling."
    force_full_page_ocr: false

  standard_rapidocr_force_ocr:
    <<: *rapidocr_common
    description: "Forced RapidOCR, if supported by installed Docling."
    force_full_page_ocr: true

  standard_rapidocr_torch_cuda_force_ocr:
    <<: *rapidocr_common
    description: "Forced RapidOCR with torch CUDA backend, if supported by installed Docling."
    device: cuda
    force_full_page_ocr: true
    gpu_required: true
    gpu_preferred: true
    rapidocr_backend: torch

  standard_cuda_accurate_doclingparse:
    <<: *cuda_standard_common
    description: "CUDA standard accurate profile using docling_parse backend."
    pdf_backend: docling_parse
    do_ocr: false
    force_full_page_ocr: false
    do_cell_matching: true

  standard_cuda_accurate_pypdfium2:
    <<: *cuda_standard_common
    description: "CUDA standard accurate profile using pypdfium2 backend."
    pdf_backend: pypdfium2
    do_ocr: false
    force_full_page_ocr: false
    do_cell_matching: true

  standard_cuda_accurate_cellmatch_false:
    <<: *cuda_standard_common
    description: "CUDA standard accurate profile with cell matching disabled."
    do_ocr: false
    force_full_page_ocr: false
    do_cell_matching: false

  standard_cuda_tesseract_force_ocr_psm6:
    <<: *cuda_standard_common
    description: "CUDA standard profile with forced Tesseract OCR, PSM 6."
    ocr_engine: tesseract
    ocr_lang: [spa, eng]
    psm: 6
    do_ocr: true
    force_full_page_ocr: true
    do_cell_matching: true

  standard_cuda_easyocr_force_ocr:
    <<: *cuda_standard_common
    description: "CUDA standard profile with forced EasyOCR."
    ocr_engine: easyocr
    ocr_lang: [es, en]
    do_ocr: true
    force_full_page_ocr: true
    do_cell_matching: true

  vlm_granite_docling_cuda_scale3:
    <<: *vlm_common
    description: "VLM pipeline with Granite Docling on CUDA at image scale 3.0."
    vlm_model: granite_docling
    images_scale: 3.0
    do_ocr: false
    force_full_page_ocr: false
    do_table_structure: true
    table_mode: accurate
    do_cell_matching: true

  vlm_smoldocling_cuda:
    <<: *vlm_common
    description: "VLM pipeline with SmolDocling on CUDA, skipped if unsupported."
    vlm_model: smoldocling
    do_ocr: false
    force_full_page_ocr: false
    do_table_structure: true
    table_mode: accurate
    do_cell_matching: true

  vlm_qwen_cuda_if_available:
    <<: *vlm_common
    description: "VLM pipeline with Qwen preset on CUDA, skipped if unsupported."
    vlm_model: qwen
    do_ocr: false
    force_full_page_ocr: false
    do_table_structure: true
    table_mode: accurate
    do_cell_matching: true

  extreme_doclingparse_tesseract_force_psm6_scale3_cellmatch_true_cuda:
    <<: *extreme_common
    description: "Extreme CUDA docling_parse + forced Tesseract PSM 6 + scale 3.0 + cell matching."
    pdf_backend: docling_parse
    ocr_engine: tesseract
    ocr_lang: [spa, eng]
    psm: 6
    do_cell_matching: true

  extreme_doclingparse_tesseract_force_psm6_scale3_cellmatch_false_cuda:
    <<: *extreme_common
    description: "Extreme CUDA docling_parse + forced Tesseract PSM 6 + scale 3.0 without cell matching."
    pdf_backend: docling_parse
    ocr_engine: tesseract
    ocr_lang: [spa, eng]
    psm: 6
    do_cell_matching: false

  extreme_pypdfium2_tesseract_force_psm11_scale3_cellmatch_true_cuda:
    <<: *extreme_common
    description: "Extreme CUDA pypdfium2 + forced Tesseract PSM 11 + scale 3.0 + cell matching."
    pdf_backend: pypdfium2
    ocr_engine: tesseract
    ocr_lang: [spa, eng]
    psm: 11
    do_cell_matching: true

  extreme_easyocr_force_scale3_cellmatch_false_cuda:
    <<: *extreme_common
    description: "Extreme CUDA forced EasyOCR + scale 3.0 without cell matching."
    ocr_engine: easyocr
    ocr_lang: [es, en]
    do_cell_matching: false
